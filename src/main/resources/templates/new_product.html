<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" type="text/css" href="webjars/bootstrap/5.3.8/css/bootstrap.min.css">
</head>
<body class="m-4">
<h2>Add a new product</h2>
<form method="post" th:action="@{/new-product}" th:object="${product}" >
    <div class="mt-2">
        <label class="form-label" for="name">Name</label><br>
        <input class="form-text" type="text" id="name" th:field="*{name}"><br>
        <span class="text-danger" th:errors="${product.name}"></span>
    </div>
    <div class="mt-2">
        <label class="form-label" for="price">Price</label><br>
        <input class="form-text" type="text" id="price" th:field="*{price}"><br>
        <span class="text-danger" th:errors="${product.price}"></span>
    </div>
    <div class="mt-2">
        <label class="form-label" for="quantity">Quantity</label><br>
        <input class="form-text" type="text" id="quantity" th:field="*{quantity}"><br>
        <span class="text-danger" th:errors="${product.quantity}"></span>
    </div>
    <input class="btn btn-primary my-2" type="submit" value="Add">
</form>
</body>
</html>
